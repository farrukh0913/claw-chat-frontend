<div class="min-h-screen bg-gray-100">
    <!-- Top Navigation -->
    <div class="bg-white shadow-sm px-6 py-4">
      
      <div class="flex items-center gap-2">
  
        <!-- Tab: Users -->
        <a
          routerLink="/users"
          routerLinkActive="bg-blue-600 text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="px-5 py-2 rounded-lg text-gray-700 hover:bg-blue-100 transition font-medium cursor-pointer"
        >
          Users
        </a>
  
        <!-- Tab: Chat -->
        <a
          routerLink="/chat"
          routerLinkActive="bg-blue-600 text-white"
          class="px-5 py-2 rounded-lg text-gray-700 hover:bg-blue-100 transition font-medium cursor-pointer"
        >
          Chat
        </a>
  
      </div>
  
    </div>
  
    <!-- Page Content -->
    <div class="p-6">
      <div class="bg-white rounded-2xl shadow-sm p-6 min-h-[400px]">
        <router-outlet></router-outlet>
      </div>
    </div>
  
  </div>
